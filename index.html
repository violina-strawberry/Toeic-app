<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高階商務單字練習</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; position: relative; }
        
        /* 星號按鈕 */
        .star-btn { position: absolute; top: 20px; right: 20px; font-size: 28px; cursor: pointer; color: #ddd; transition: 0.2s; border: none; background: none; outline: none; }
        .star-btn.active { color: #f1c40f; }
        
        /* 發音按鈕 */
        .speaker-btn { font-size: 20px; cursor: pointer; color: #3498db; background: #ebf5ff; border: none; border-radius: 50%; width: 40px; height: 40px; margin-top: 10px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .speaker-btn:hover { background: #3498db; color: white; }

        #mode-label { font-size: 12px; color: #bbb; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .pos { font-size: 14px; color: #9b59b6; font-weight: bold; margin-bottom: 5px; height: 20px; }
        
        #word-display { font-size: 36px; color: #2c3e50; margin: 5px 0; min-height: 50px; transition: opacity 0.15s ease; }
        #ans-display { font-size: 20px; color: #3498db; min-height: 30px; opacity: 0; transition: opacity 0.15s ease; margin-bottom: 25px; font-weight: 500; }
        
        .show-answer #ans-display { opacity: 1 !important; }
        .switching #word-display, .switching #ans-display, .switching .speaker-btn { opacity: 0 !important; }

        .button-group { display: flex; flex-direction: column; gap: 12px; }
        button.action { padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; outline: none; }
        .primary { background: #3498db; color: white; }
        .secondary { background: #2ecc71; color: white; }
        
        .mode-btn { background: #f8f9fa; color: #95a5a6; font-size: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #eee; cursor: pointer; padding: 8px; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <button id="star" class="star-btn" onclick="toggleStar()">★</button>
    <div id="mode-label">英翻中模式</div>
    
    <div class="word-box">
        <div class="pos" id="pos-display"></div>
        <h1 id="word-display">載入中...</h1>
        <div id="ans-display"></div>
        <button class="speaker-btn" onclick="speakWord()">📢</button>
    </div>

    <div class="button-group" style="margin-top: 20px;">
        <button class="action primary" onclick="showAnswer()">看答案</button>
        <button class="action secondary" onclick="nextWord()">下一題 (隨機)</button>
        <button class="mode-btn" onclick="toggleMode()">切換 英中 / 中英</button>
    </div>
</div>

<script>
    let myWords = [];
    let currentIndex = 0;
    let isEnToZh = true;

    function getStoredStars() {
        const saved = localStorage.getItem('toeic_stars');
        return saved ? JSON.parse(saved) : {};
    }

    function saveStar(wordEn, isStarred) {
        const stars = getStoredStars();
        stars[wordEn] = isStarred;
        localStorage.setItem('toeic_stars', JSON.stringify(stars));
    }

    async function loadWords() {
        try {
            const response = await fetch('words.json');
            if (!response.ok) throw new Error();
            const data = await response.json();
            const starredMap = getStoredStars();
            myWords = data.map(w => ({
                ...w,
                starred: starredMap[w.en] !== undefined ? starredMap[w.en] : (w.starred || false)
            }));
            nextWord();
        } catch (e) {
            document.getElementById('word-display').innerText = "載入失敗";
        }
    }

    function showAnswer() {
        document.getElementById('main-card').classList.add('show-answer');
    }

    // 發音功能
    function speakWord() {
        const word = myWords[currentIndex].en;
        const msg = new SpeechSynthesisUtterance();
        msg.text = word;
        msg.lang = 'en-US'; // 設定為美式英文
        msg.rate = 0.9;      // 語速稍微慢一點點比較清晰
        window.speechSynthesis.speak(msg);
    }
