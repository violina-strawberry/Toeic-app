<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多益高階單字機</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; position: relative; }
        
        /* 星號按鈕樣式 */
        .star-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: #ccc; transition: 0.2s; }
        .star-btn.active { color: #f1c40f; }

        .pos { font-size: 14px; color: #9b59b6; font-weight: bold; margin-bottom: 5px; text-transform: lowercase; }
        #word-display { font-size: 36px; color: #2c3e50; margin: 10px 0; }
        #ans-display { font-size: 20px; color: #3498db; min-height: 30px; opacity: 0; transition: 0.3s; margin-bottom: 20px; }
        .show-answer #ans-display { opacity: 1; }

        .button-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .primary { background: #3498db; color: white; }
        .secondary { background: #2ecc71; color: white; }
        .mode-btn { background: #eee; color: #777; font-size: 12px; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="star" class="star-btn" onclick="toggleStar()">★</div>
    <div id="mode-label" style="font-size: 12px; color: #bbb; margin-bottom: 10px;">英翻中模式</div>
    
    <div class="pos" id="pos-display">adj.</div>
    <h1 id="word-display">載入中...</h1>
    <div id="ans-display">翻譯</div>

    <div class="button-group">
        <button class="primary" onclick="document.getElementById('main-card').classList.add('show-answer')">看答案</button>
        <button class="secondary" onclick="nextWord()">下一個單字</button>
        <button class="mode-btn" onclick="toggleMode()">切換 英中 / 中英</button>
    </div>
</div>

<script>
    let myWords = [];
    let currentIndex = 0;
    let isEnToZh = true;

    async function loadWords() {
        try {
            const response = await fetch('words.json');
            myWords = await response.json();
            // 確保每個單字都有 starred 屬性
            myWords = myWords.map(w => ({...w, starred: w.starred || false}));
            nextWord();
        } catch (e) { document.getElementById('word-display').innerText = "載入失敗"; }
    }

    function nextWord() {
        if (myWords.length === 0) return;

        // 權重隨機算法：有星號的單字在陣列中重複出現 5 次
        let weightedPool = [];
        myWords.forEach((word, index) => {
            weightedPool.push(index); // 基本的 1 次
            if (word.starred) {
                for(let i=0; i<4; i++) weightedPool.push(index); // 額外加 4 次，共 5 倍機率
            }
        });

        const randomIndex = weightedPool[Math.floor(Math.random() * weightedPool.length)];
        currentIndex = randomIndex;

        document.getElementById('main-card').classList.remove('show-answer');
        updateDisplay();
    }

    function updateDisplay() {
        const item = myWords[currentIndex];
        document.getElementById('pos-display').innerText = item.pos || "";
        document.getElementById('star').classList.toggle('active', item.starred);
        
        if (isEnToZh) {
            document.getElementById('word-display').innerText = item.en;
            document.getElementById('ans-display').innerText = item.zh;
        } else {
            document.getElementById('word-display').innerText = item.zh;
            document.getElementById('ans-display').innerText = item.en;
        }
    }

    function toggleStar() {
        myWords[currentIndex].starred = !myWords[currentIndex].starred;
        document.getElementById('star').classList.toggle('active', myWords[currentIndex].starred);
        // 注意：目前的星號狀態只存在於網頁開啟期間，刷新後會回到 json 的原始狀態
        console.log("單字星號狀態已更新", myWords[currentIndex]);
    }

    function toggleMode() {
        isEnToZh = !isEnToZh;
        document.getElementById('mode-label').innerText = isEnToZh ? "英翻中模式" : "中翻英模式";
        updateDisplay();
    }

    loadWords();
</script>
</body>
</html>
