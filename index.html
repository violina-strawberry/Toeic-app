<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TOEIC單字機">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3771/3771127.png">
    <title>高階商務單字練習</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); overflow: hidden; }
        
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90vw; max-width: 340px; position: relative; }
        
        /* 進度條區域 - 獨立在最上方 */
        .progress-section { margin-bottom: 25px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; }
        .progress-text { font-size: 12px; color: #888; margin-bottom: 8px; display: flex; justify-content: space-between; font-weight: bold; }
        .progress-bar { height: 10px; background: #eee; border-radius: 5px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); width: 0%; transition: width 0.5s ease; }

        /* 單字顯示區 */
        .word-box { margin: 20px 0; }
        #mode-label { font-size: 11px; color: #bbb; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; display: block; }
        .pos { font-size: 14px; color: #9b59b6; font-weight: bold; margin-bottom: 5px; height: 20px; }
        #word-display { font-size: 32px; color: #2c3e50; margin: 5px 0; min-height: 45px; transition: opacity 0.2s; word-break: break-word; }
        #ans-display { font-size: 20px; color: #3498db; min-height: 30px; opacity: 0; transition: opacity 0.2s; margin-bottom: 15px; font-weight: 500; }
        
        /* 功能按鈕區 (星星 + 喇叭) */
        .action-btns { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 20px; }
        .icon-btn { cursor: pointer; border: none; background: none; outline: none; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; }
        .icon-btn:active { transform: scale(0.9); }
        
        .star-btn { font-size: 32px; color: #ddd; padding: 0; }
        .star-btn.active { color: #f1c40f; }
        
        .speaker-btn { font-size: 20px; color: white; background: #3498db; border-radius: 50%; width: 45px; height: 45px; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }

        .show-answer #ans-display { opacity: 1 !important; }
        .switching #word-display, .switching #ans-display, .switching .action-btns { opacity: 0 !important; }

        .button-group { display: flex; flex-direction: column; gap: 12px; }
        button.action { padding: 15px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .primary { background: #3498db; color: white; }
        .secondary { background: #2ecc71; color: white; }
        
        .footer-tools { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 10px; }
        .footer-btn { background: none; border: none; color: #bbb; font-size: 11px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
<div class="card" id="main-card">
    <div class="progress-section">
        <div class="progress-text">
            <span>學習進度</span>
            <span id="progress-count">0 / 0</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    
    <div id="mode-label">載入中...</div>
    
    <div class="word-box">
        <div class="pos" id="pos-display"></div>
        <h1 id="word-display">請稍候...</h1>
        <div id="ans-display"></div>
    </div>

    <div class="action-btns">
        <button class="icon-btn speaker-btn" onclick="speakWord()">🔊</button>
        <button id="star" class="icon-btn star-btn" onclick="toggleStar()">★</button>
    </div>

    <div class="button-group">
        <button class="action primary" onclick="showAnswer()">看答案</button>
        <button class="action secondary" onclick="nextWord()">下一題</button>
    </div>

    <div class="footer-tools">
        <button class="footer-btn" onclick="toggleMode()">切換模式</button>
        <button class="footer-btn" onclick="resetProgress()">重置進度</button>
    </div>
</div>

<script>
    let myWords = [];
    let learnedIndexes = [];
    let currentIndex = -1;
    let isEnToZh = true;

    function getStoredStars() { const saved = localStorage.getItem('toeic_stars'); return saved ? JSON.parse(saved) : {}; }
    function saveStar(wordEn, isStarred) { const stars = getStoredStars(); stars[wordEn] = isStarred; localStorage.setItem('toeic_stars', JSON.stringify(stars)); }
    function getStoredProgress() { const saved = localStorage.getItem('toeic_progress'); return saved ? JSON.parse(saved) : []; }
    function saveProgress() { localStorage.setItem('toeic_progress', JSON.stringify(learnedIndexes)); }

    async function loadWords() {
        try {
            const response = await fetch('words.json?v=' + Date.now());
            const data = await response.json();
            const starredMap = getStoredStars();
            myWords = data.map(w => ({...w, starred: starredMap[w.en] !== undefined ? starredMap[w.en] : (w.starred || false)}));
            learnedIndexes = getStoredProgress().filter(idx => idx < myWords.length);
            nextWord();
        } catch (e) { document.getElementById('word-display').innerText = "載入失敗"; }
    }

    function showAnswer() { document.getElementById('main-card').classList.add('show-answer'); }

    function speakWord() { 
        if(currentIndex === -1) return;
        window.speechSynthesis.cancel(); // 先停止之前的發音
        const msg = new SpeechSynthesisUtterance(myWords[currentIndex].en); 
        msg.lang = 'en-US'; 
        window.speechSynthesis.speak(msg); 
    }

    function nextWord() {
        if (myWords.length === 0) return;
        if (learnedIndexes.length >= myWords.length) {
            alert("恭喜全部背完！進度將重置。");
            resetProgress();
            return;
        }
        const card = document.getElementById('main-card');
        card.classList.remove('show-answer');
        card.classList.add('switching');
        setTimeout(() => {
            let unlearned = [];
            myWords.forEach((w, i) => { if (!learnedIndexes.includes(i)) unlearned.push(i); });
            currentIndex = unlearned[Math.floor(Math.random() * unlearned.length)];
            learnedIndexes.push(currentIndex);
            saveProgress();
            updateDisplay();
            setTimeout(() => { card.classList.remove('switching'); }, 100);
        }, 250);
    }

    function updateDisplay() {
        const item = myWords[currentIndex];
        document.getElementById('progress-count').innerText = `${learnedIndexes.length} / ${myWords.length}`;
        document.getElementById('progress-fill').style.width = `${(learnedIndexes.length / myWords.length) * 100}%`;
        document.getElementById('pos-display').innerText = item.pos || "";
        document.getElementById('star').classList.toggle('active', item.starred);
        document.getElementById('mode-label').innerText = isEnToZh ? "英翻中模式" : "中翻英模式";
        if (isEnToZh) { document.getElementById('word-display').innerText = item.en; document.getElementById('ans-display').innerText = item.zh; }
        else { document.getElementById('word-display').innerText = item.zh; document.getElementById('ans-display').innerText = item.en; }
    }

    function toggleStar() {
        const item = myWords[currentIndex];
        item.starred = !item.starred;
        document.getElementById('star').classList.toggle('active', item.starred);
        saveStar(item.en, item.starred);
    }

    function toggleMode() { isEnToZh = !isEnToZh; updateDisplay(); document.getElementById('main-card').classList.remove('show-answer'); }
    function resetProgress() { if (confirm("確定要重置進度嗎？")) { learnedIndexes = []; saveProgress(); nextWord(); } }
    loadWords();
</script>
</body>
</html>
