<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高階商務單字練習</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; position: relative; }
        .star-btn { position: absolute; top: 20px; right: 20px; font-size: 28px; cursor: pointer; color: #ddd; transition: 0.2s; border: none; background: none; }
        .star-btn.active { color: #f1c40f; }
        #mode-label { font-size: 12px; color: #bbb; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .pos { font-size: 14px; color: #9b59b6; font-weight: bold; margin-bottom: 5px; }
        #word-display { font-size: 36px; color: #2c3e50; margin: 10px 0; min-height: 50px; }
        #ans-display { font-size: 20px; color: #3498db; min-height: 30px; opacity: 0; transition: 0.3s; margin-bottom: 30px; font-weight: 500; }
        .show-answer #ans-display { opacity: 1; }
        .button-group { display: flex; flex-direction: column; gap: 12px; }
        button.action { padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .primary { background: #3498db; color: white; }
        .secondary { background: #2ecc71; color: white; }
        .mode-btn { background: #f8f9fa; color: #95a5a6; font-size: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #eee; cursor: pointer; padding: 8px; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <button id="star" class="star-btn" onclick="toggleStar()">★</button>
    <div id="mode-label">英翻中模式</div>
    
    <div class="word-box">
        <div class="pos" id="pos-display">-</div>
        <h1 id="word-display">載入中...</h1>
        <div id="ans-display">翻譯載入中</div>
    </div>

    <div class="button-group">
        <button class="action primary" onclick="document.getElementById('main-card').classList.add('show-answer')">看答案</button>
        <button class="action secondary" onclick="nextWord()">下一題 (隨機)</button>
        <button class="mode-btn" onclick="toggleMode()">切換 英中 / 中英</button>
    </div>
</div>

<script>
    let myWords = [];
    let currentIndex = 0;
    let isEnToZh = true;

    // 從瀏覽器記憶體載入星號狀態
    function getStoredStars() {
        const saved = localStorage.getItem('toeic_stars');
        return saved ? JSON.parse(saved) : {};
    }

    // 儲存星號狀態到瀏覽器
    function saveStar(wordEn, isStarred) {
        const stars = getStoredStars();
        stars[wordEn] = isStarred;
        localStorage.setItem('toeic_stars', JSON.stringify(stars));
    }

    async function loadWords() {
        try {
            // 注意：這裡確保抓取的是同層級的 words.json
            const response = await fetch('words.json');
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            const starredMap = getStoredStars();
            myWords = data.map(w => ({
                ...w,
                starred: starredMap[w.en] !== undefined ? starredMap[w.en] : (w.starred || false)
            }));
            
            nextWord();
        } catch (e) {
            document.getElementById('word-display').innerText = "載入失敗";
            document.getElementById('ans-display').innerText = "請檢查 words.json 位置";
            document.getElementById('ans-display').style.opacity = 1;
        }
    }

    function nextWord() {
        if (myWords.length === 0) return;

        // 權重隨機：有星號的單字抽中機率提高 5 倍
        let pool = [];
        myWords.forEach((w, i) => {
            pool.push(i);
            if (w.starred) for(let j=0; j<4; j++) pool.push(i);
        });

        currentIndex = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('main-card').classList.remove('show-answer');
        updateDisplay();
    }

    function updateDisplay() {
        const item = myWords[currentIndex];
        document.getElementById('pos-display').innerText = item.pos || "";
        document.getElementById('star').classList.toggle('active', item.starred);
        
        if (isEnToZh) {
            document.getElementById('word-display').innerText = item.en;
            document.getElementById('ans-display').innerText = item.zh;
        } else {
            document.getElementById('word-display').innerText = item.zh;
            document.getElementById('ans-display').innerText = item.en;
        }
    }

    function toggleStar() {
        const item = myWords[currentIndex];
        item.starred = !item.starred;
        document.getElementById('star').classList.toggle('active', item.starred);
        saveStar(item.en, item.starred);
    }

    function toggleMode() {
        isEnToZh = !isEnToZh;
        document.getElementById('mode-label').innerText = isEnToZh ? "英翻中模式" : "中翻英模式";
        updateDisplay();
    }

    loadWords();
</script>
</body>
</html>
