<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字清單</title>
    <style>
        body { font-family: sans-serif; background: #f5f7fa; padding: 20px; }
        .item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .en { font-weight: bold; font-size: 18px; }
        .btn { border: none; background: none; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration: none; color: #3498db;">← 返回首頁</a>
    <h2>單字本</h2>
    <div id="list">載入中...</div>

    <script>
        async function load() {
            const res = await fetch('words.json?v=' + Date.now());
            const words = await res.json();
            const stars = JSON.parse(localStorage.getItem('toeic_stars') || '{}');
            const con = document.getElementById('list');
            con.innerHTML = '';
            words.forEach(w => {
                const isS = stars[w.en] ? '★' : '☆';
                con.innerHTML += '<div class="item"><div><div class="en">'+w.en+'</div><div>'+w.zh+'</div></div><button class="btn" onclick="speak(\''+w.en+'\')">🔊</button></div>';
            });
        }
        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'en-US';
            window.speechSynthesis.speak(m);
        }
        load();
    </script>
</body>
</html>
