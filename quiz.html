<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測驗模式</title>
    <style>
        body { font-family: sans-serif; background: #f5f7fa; display: flex; justify-content: center; padding-top: 50px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .ans { color: #3498db; margin: 20px 0; min-height: 25px; opacity: 0; }
        .show .ans { opacity: 1; }
        button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-ans { background: #3498db; color: white; }
        .btn-next { background: #2ecc71; color: white; }
    </style>
</head>
<body>
    <div class="card" id="box">
        <a href="index.html" style="text-decoration: none; color: #bbb; font-size: 12px; display: block; text-align: left;">← 返回</a>
        <h1 id="word">Loading...</h1>
        <div class="ans" id="ans"></div>
        <button class="btn-ans" onclick="document.getElementById('box').classList.add('show')">看答案</button>
        <button class="btn-next" onclick="next()">下一題</button>
    </div>

    <script>
        let ws = [];
        async function load() {
            const res = await fetch('words.json?v=' + Date.now());
            ws = await res.json();
            next();
        }
        function next() {
            document.getElementById('box').classList.remove('show');
            const r = ws[Math.floor(Math.random() * ws.length)];
            document.getElementById('word').innerText = r.en;
            document.getElementById('ans').innerText = r.zh;
        }
        load();
    </script>
</body>
</html>
