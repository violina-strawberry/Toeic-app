<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEIC學習中心</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .menu-card { background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 85vw; max-width: 350px; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 30px; }
        .menu-btn { 
            display: block; width: 100%; padding: 20px; margin-bottom: 15px; 
            border: none; border-radius: 20px; font-size: 18px; font-weight: bold; 
            cursor: pointer; text-decoration: none; transition: 0.3s;
        }
        .btn-quiz { background: #3498db; color: white; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); }
        .btn-list { background: #2ecc71; color: white; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }
        .menu-btn:hover { transform: translateY(-3px); }
        .subtitle { color: #95a5a6; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="menu-card">
        <h1>TOEIC 800+ 訓練營</h1>
        <a href="quiz.html" class="menu-btn btn-quiz">🎯 挑戰模式</a>
        <p style="font-size: 12px; color: #7f8c8d;">(隨機抽題、記錄進度)</p>
        
        <a href="list.html" class="menu-btn btn-list">📖 單字清單</a>
        <p style="font-size: 12px; color: #7f8c8d;">(瀏覽所有單字、標記星星)</p>
        
        <div class="subtitle">目標：突破 900 分！🔥</div>
    </div>
</body>
</html>
