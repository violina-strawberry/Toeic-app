<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>測驗模式</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            font-family: sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; justify-content: center; padding-top: 50px; margin: 0; min-height: 100vh;
        }
        .card { 
            background: white; padding: 30px; border-radius: 25px; text-align: center; 
            width: 90%; max-width: 350px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); height: fit-content;
        }
        #word { font-size: 32px; color: #2c3e50; margin: 20px 0 10px 0; }
        #pos { color: #9b59b6; font-weight: bold; font-size: 14px; height: 20px; }
        .ans-box { 
            background: #f8f9fa; border-radius: 15px; margin: 20px 0; min-height: 60px; 
            display: flex; align-items: center; justify-content: center; font-size: 22px; 
            color: #3498db; font-weight: bold;
        }
        button { 
            width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s;
        }
        .btn-ans { background: #3498db; color: white; }
        .btn-next { background: #2ecc71; color: white; }
        .btn-ans:active, .btn-next:active { transform: scale(0.95); }
        .back { text-decoration: none; color: #bbb; font-size: 13px; display: block; text-align: left; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <a href="index.html" class="back">← 返回選單</a>
        <div id="pos"></div>
        <h1 id="word">Loading...</h1>
        
        <div class="ans-box" id="ans-display">? ? ?</div>
        
        <button class="btn-ans" onclick="showAns()">看答案</button>
        <button class="btn-next" onclick="nextWord()">下一題</button>
    </div>

    <script>
        let words = [];
        let current = null;

        async function init() {
            const res = await fetch('words.json?v=' + Date.now());
            words = await res.json();
            nextWord();
        }

        function nextWord() {
            // 1. 隨機選一個字
            current = words[Math.floor(Math.random() * words.length)];
            
            // 2. 只顯示題目，把答案區遮住
            document.getElementById('word').innerText = current.en;
            document.getElementById('pos').innerText = current.pos || 'n.';
            document.getElementById('ans-display').innerText = "？ ？ ？"; 
            document.getElementById('ans-display').style.color = "#ccc";
        }

        function showAns() {
            if(!current) return;
            // 點擊後才顯示中文
            document.getElementById('ans-display').innerText = current.zh;
            document.getElementById('ans-display').style.color = "#3498db";
            
            // 順便發音 (這樣背比較快)
            const msg = new SpeechSynthesisUtterance(current.en);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        init();
    </script>
</body>
</html>
