<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEIC 測驗模式</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .spacer { height: 20px; }
        .card { 
            background: white; padding: 25px; border-radius: 28px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); 
            text-align: center; width: 100%; max-width: 400px; position: relative;
        }
        
        /* 進度條 */
        .progress-section { margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px dashed #eee; }
        .progress-text { font-size: 11px; color: #999; margin-bottom: 6px; display: flex; justify-content: space-between; font-weight: bold; }
        .progress-bar { height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #3498db; width: 0%; transition: width 0.5s; }

        #word { font-size: 34px; color: #2c3e50; margin: 10px 0; min-height: 45px; }
        #pos { color: #9b59b6; font-weight: 800; font-size: 14px; height: 20px; }
        
        .ans-box { 
            background: #f8f9fa; border-radius: 15px; margin: 20px 0; min-height: 65px; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; 
            color: #ccc; font-weight: bold;
        }

        /* 喇叭與星星按鈕 */
        .icon-btns { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 20px; }
        .btn-icon { border: none; background: none; cursor: pointer; transition: transform 0.1s; padding: 0; outline: none; }
        .btn-icon:active { transform: scale(0.9); }
        .speaker { font-size: 22px; color: white; background: #3498db; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(52,152,219,0.3); }
        .star { font-size: 36px; color: #eee; }
        .star.active { color: #f1c40f; }

        button.action { width: 100%; padding: 18px; margin: 8px 0; border: none; border-radius: 16px; cursor: pointer; font-weight: 800; font-size: 18px; }
        .primary { background: #3498db; color: white; }
        .secondary { background: #2ecc71; color: white; }
        .back-link { text-decoration: none; color: #bbb; font-size: 12px; display: block; text-align: left; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="spacer"></div>
    <div class="card">
        <a href="index.html" class="back-link">← 返回選單</a>
        
        <div class="progress-section">
            <div class="progress-text"><span>PROGRESS</span><span id="prog-count">0 / 0</span></div>
            <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
        </div>

        <div id="pos"></div>
        <h1 id="word">Loading...</h1>
        <div class="ans-box" id="ans-display">？ ？ ？</div>

        <div class="icon-btns">
            <button class="btn-icon speaker" onclick="handleSpeak()">🔊</button>
            <button id="star-btn" class="btn-icon star" onclick="handleStar()">★</button>
        </div>

        <button class="action primary" onclick="handleShowAns()">看答案</button>
        <button class="action secondary" onclick="handleNext()">下一題</button>
    </div>

<script>
    let words = [];
    let currentIdx = -1;
    let learnedArr = [];

    async function initApp() {
        const res = await fetch('words.json?v=' + Date.now());
        words = await res.json();
        learnedArr = JSON.parse(localStorage.getItem('toeic_progress') || '[]');
        handleNext();
    }

    function handleNext() {
        // 1. 強制洗掉所有內容，不留任何上一題的殘影
        document.getElementById('ans-display').innerText = "？ ？ ？";
        document.getElementById('ans-display').style.color = "#ccc";
        document.getElementById('word').innerText = "...";
        document.getElementById('pos').innerText = "";
        document.getElementById('star-btn').classList.remove('active');

        // 2. 延遲抽題，確保瀏覽器已經渲染完「清空」後的畫面
        setTimeout(() => {
            currentIdx = Math.floor(Math.random() * words.length);
            const item = words[currentIdx];

            // 3. 只顯示題目與詞性
            document.getElementById('word').innerText = item.en;
            document.getElementById('pos').innerText = item.pos || 'n.';
            
            // 4. 更新星星
            const stars = JSON.parse(localStorage.getItem('toeic_stars') || '{}');
            if(stars[item.en]) document.getElementById('star-btn').classList.add('active');

            // 5. 更新進度條
            if(!learnedArr.includes(currentIdx)) learnedArr.push(currentIdx);
            localStorage.setItem('toeic_progress', JSON.stringify(learnedArr));
            
            document.getElementById('prog-count').innerText = learnedArr.length + " / " + words.length;
            document.getElementById('prog-fill').style.width = (learnedArr.length / words.length * 100) + "%";
        }, 100); // 稍微加長到 100 毫秒比較保險
    }

    function handleShowAns() {
        if(currentIdx === -1) return;
        const item = words[currentIdx];
        const display = document.getElementById('ans-display');
        
        // 按下才顯示中文
        display.innerText = item.zh;
        display.style.color = "#3498db";
    }

    function handleSpeak() {
        if(currentIdx === -1) return;
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(words[currentIdx].en);
        m.lang = 'en-US';
        window.speechSynthesis.speak(m);
    }

    function handleStar() {
        if(currentIdx === -1) return;
        const btn = document.getElementById('star-btn');
        const isActive = btn.classList.toggle('active');
        const stars = JSON.parse(localStorage.getItem('toeic_stars') || '{}');
        stars[words[currentIdx].en] = isActive;
        localStorage.setItem('toeic_stars', JSON.stringify(stars));
    }

    initApp();
</script>
</body>
</html>
