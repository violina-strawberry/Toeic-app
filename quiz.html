<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>測驗模式</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            font-family: sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; justify-content: center; padding-top: 50px; margin: 0; min-height: 100vh;
        }
        .card { 
            background: white; padding: 30px; border-radius: 25px; text-align: center; 
            width: 90%; max-width: 350px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); height: fit-content;
        }
        #word { font-size: 32px; color: #2c3e50; margin: 20px 0 10px 0; }
        #pos { color: #9b59b6; font-weight: bold; font-size: 14px; height: 20px; }
        .ans-box { 
            background: #f8f9fa; border-radius: 15px; margin: 20px 0; min-height: 60px; 
            display: flex; align-items: center; justify-content: center; font-size: 22px; 
            color: #ccc; font-weight: bold; border: 1px dashed #eee;
        }
        button { 
            width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s;
        }
        .btn-ans { background: #3498db; color: white; }
        .btn-next { background: #2ecc71; color: white; }
        .back { text-decoration: none; color: #bbb; font-size: 13px; display: block; text-align: left; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <a href="index.html" class="back">← 返回選單</a>
        <div id="pos"></div>
        <h1 id="word">Loading...</h1>
        <div class="ans-box" id="ans-display">TAP TO SHOW</div>
        <button class="btn-ans" onclick="showAns()">看答案</button>
        <button class="btn-next" onclick="nextWord()">下一題</button>
    </div>

    <script>
        let words = [];
        let currentIndex = -1;

        async function init() {
            // 加個亂數標籤強制刷新資料
            const res = await fetch('words.json?v=' + Date.now());
            words = await res.json();
            nextWord();
        }

        function nextWord() {
            // 1. 先把答案區徹底洗掉，連文字顏色都變淡
            const ansArea = document.getElementById('ans-display');
            ansArea.innerText = "？ ？ ？";
            ansArea.style.color = "#ccc";

            // 2. 隨機選索引
            currentIndex = Math.floor(Math.random() * words.length);
            const item = words[currentIndex];

            // 3. 只填入英文跟詞性
            document.getElementById('word').innerText = item.en;
            document.getElementById('pos').innerText = item.pos || 'n.';
        }

        function showAns() {
            if(currentIndex === -1) return;
            const item = words[currentIndex];
            
            // 4. 按下按鈕這秒，才把中文塞進去
            const ansArea = document.getElementById('ans-display');
            ansArea.innerText = item.zh;
            ansArea.style.color = "#3498db";

            // 發音
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(item.en);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        init();
    </script>
</body>
</html>
